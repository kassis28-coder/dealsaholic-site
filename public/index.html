<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dealsaholic — Today's Best Amazon Deals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #FAF8F4;
    --card: #FFFFFF;
    --ink: #1C1A17;
    --ink-soft: #6B6459;
    --deal-red: #E1432D;
    --deal-red-dark: #B8341F;
    --line: #E8E2D8;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    min-height: 100vh;
  }

  .site-footer {
    text-align: center;
    padding: 28px 20px 44px;
    font-size: 12px;
    color: var(--ink-soft);
    border-top: 1px solid var(--line);
    margin-top: 8px;
  }

  .deals-feed {
    padding: 32px 0 24px;
    max-width: 1320px;
    margin: 0 auto;
  }

  .deals-feed__header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 24px 20px;
    border-bottom: 2px solid var(--ink);
    margin: 0 0 24px;
  }

  .deals-feed__title {
    font-family: 'Archivo Black', sans-serif;
    font-weight: 400;
    font-size: 26px;
    letter-spacing: -0.01em;
    margin: 0;
    text-transform: uppercase;
  }

  .deals-feed__title span {
    color: var(--deal-red);
  }

  .deals-feed__updated {
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-soft);
    font-family: 'Inter', sans-serif;
  }

  .deals-feed__grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 16px;
    padding: 0 24px;
  }

  .deal-card {
    position: relative;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
    text-decoration: none;
    color: var(--ink);
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    display: flex;
    flex-direction: column;
  }

  .deal-card:hover {
    transform: translateY(-3px);
    border-color: var(--deal-red);
    box-shadow: 0 8px 20px rgba(28, 26, 23, 0.08);
  }

  .deal-card:focus-visible { outline: 2px solid var(--deal-red); outline-offset: 2px; }

  .deal-card__image-wrap {
    position: relative;
    background: #fff;
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid var(--line);
  }

  .deal-card__image {
    max-width: 82%;
    max-height: 82%;
    object-fit: contain;
  }

  .deal-card__badge {
    position: absolute;
    top: 10px;
    left: -6px;
    background: var(--deal-red);
    color: #fff;
    font-family: 'Archivo Black', sans-serif;
    font-size: 14px;
    line-height: 1;
    padding: 6px 11px 6px 15px;
    clip-path: polygon(0% 50%, 10% 0%, 100% 0%, 100% 100%, 10% 100%);
    filter: drop-shadow(0 2px 4px rgba(28, 26, 23, 0.25));
  }

  .deal-card__badge::after {
    content: "";
    position: absolute;
    left: 4px;
    top: 50%;
    width: 4px;
    height: 4px;
    background: var(--paper);
    border-radius: 50%;
    transform: translateY(-50%);
  }

  .deal-card__body {
    padding: 12px 13px 14px;
    display: flex;
    flex-direction: column;
    flex: 1;
  }

  .deal-card__title {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.35;
    margin: 0 0 10px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    min-height: 35px;
  }

  .deal-card__price-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-top: auto;
  }

  .deal-card__price {
    font-family: 'Archivo', sans-serif;
    font-weight: 800;
    font-size: 17px;
    color: var(--deal-red-dark);
  }

  .deal-card__rating {
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-soft);
  }

  .deals-feed__empty {
    grid-column: 1 / -1;
    padding: 64px 20px;
    text-align: center;
    color: var(--ink-soft);
    font-size: 14px;
  }

  @media (max-width: 480px) {
    .deals-feed__grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; padding: 0 16px; }
    .deals-feed__header { padding: 0 16px 16px; }
    .deals-feed__title { font-size: 21px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .deal-card { transition: none; }
  }
</style>
</head>
<body>

<div class="deals-feed" id="deals-feed">
  <div class="deals-feed__header">
    <h2 class="deals-feed__title">Today's Best <span>Deals</span></h2>
    <span class="deals-feed__updated" id="deals-updated"></span>
  </div>
  <div class="deals-feed__grid" id="deals-grid">
    <div class="deals-feed__empty">Loading today's deals…</div>
  </div>
</div>

<p class="site-footer">
  As an Amazon Associate, Dealsaholic earns from qualifying purchases.
  Prices and availability are accurate as of the time shown above and
  are subject to change.
</p>

<script>
  const DEALS_JSON_URL = '/api/deals';

  function formatUpdated(iso) {
    try {
      const d = new Date(iso);
      return 'Updated ' + d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) +
        ' · ' + d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
    } catch {
      return '';
    }
  }

  function renderDeals(data) {
    const grid = document.getElementById('deals-grid');
    const updated = document.getElementById('deals-updated');
    updated.textContent = data.generatedAt ? formatUpdated(data.generatedAt) : '';

    if (!data.deals || data.deals.length === 0) {
      grid.innerHTML = '<div class="deals-feed__empty">No deals meet today\'s discount threshold yet — check back soon.</div>';
      return;
    }

    grid.innerHTML = data.deals.map(deal => `
      <a class="deal-card" href="${deal.url}" target="_blank" rel="nofollow sponsored noopener">
        <div class="deal-card__image-wrap">
          ${deal.discountPercent ? `<div class="deal-card__badge">-${deal.discountPercent}%</div>` : ''}
          ${deal.image ? `<img class="deal-card__image" src="${deal.image}" alt="${escapeHtml(deal.title)}" loading="lazy">` : ''}
        </div>
        <div class="deal-card__body">
          <p class="deal-card__title">${escapeHtml(deal.title)}</p>
          <div class="deal-card__price-row">
            <span class="deal-card__price">${deal.price || ''}</span>
            ${deal.rating ? `<span class="deal-card__rating">★ ${deal.rating}</span>` : ''}
          </div>
        </div>
      </a>
    `).join('');
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  fetch(DEALS_JSON_URL)
    .then(res => {
      if (!res.ok) throw new Error('Could not load deals.json (' + res.status + ')');
      return res.json();
    })
    .then(renderDeals)
    .catch(err => {
      document.getElementById('deals-grid').innerHTML =
        '<div class="deals-feed__empty">Deals are loading — please refresh in a moment.</div>';
      console.error(err);
    });
</script>

</body>
</html>
